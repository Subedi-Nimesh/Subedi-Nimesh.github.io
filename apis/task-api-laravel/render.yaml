services:
  - type: web
    name: task-api-laravel
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    envVars:
      - key: APP_ENV
        value: production
      - key: APP_DEBUG
        value: false
      - key: APP_URL
        sync: false
      - key: APP_KEY
        generateValue: true
      - key: DB_CONNECTION
        value: pgsql
      - key: DATABASE_URL
        fromDatabase:
          name: task-api-db
          property: connectionString

  - type: pserv
    name: task-api-db
    plan: free
    ipAllowList: []
